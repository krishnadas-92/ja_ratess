<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jos Alukkas — Live Rates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --ink:#ffffff;
    --ink-soft:rgba(255,255,255,0.62);
    --ink-faint:rgba(255,255,255,0.40);
    --gold:#caa766;
    --gold-soft:rgba(202,167,102,0.45);
    --hair:rgba(255,255,255,0.10);
    --panel:rgba(255,255,255,0.035);
    --panel-2:rgba(255,255,255,0.05);
    --live:#33d17a;
    --serif:'Playfair Display', 'Noto Serif', serif;
    --label:'Jost', sans-serif;
    --note:'Cormorant Garamond', serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;background:#000;overflow:hidden;}

  /* fixed full-viewport frame: always the true visible size, clips anything outside */
  #wrap{
    position:fixed;inset:0;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 0%, #161310 0%, #0a0908 38%, #000 100%);
  }

  /* fixed 1080p stage, centred via translate and scaled to fit the visible area */
  #stage{
    width:1920px;height:1080px;position:absolute;top:50%;left:50%;
    transform-origin:center center;transform:translate(-50%,-50%) scale(1);
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
  }

  /* decorative double frame + corner ornaments */
  .frame{position:absolute;inset:34px;border:1.5px solid var(--gold-soft);border-radius:26px;}
  .frame::before{content:"";position:absolute;inset:10px;border:1px solid rgba(202,167,102,0.22);border-radius:18px;}
  .corner{position:absolute;width:74px;height:74px;opacity:.5;}
  .corner svg{width:100%;height:100%;display:block;}
  .corner.tl{top:14px;left:14px;}
  .corner.tr{top:14px;right:14px;transform:scaleX(-1);}
  .corner.bl{bottom:14px;left:14px;transform:scaleY(-1);}
  .corner.br{bottom:14px;right:14px;transform:scale(-1);}

  /* main card */
  .card{
    position:relative;width:1772px;border-radius:22px;
    background:linear-gradient(180deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.02) 30%, rgba(255,255,255,0.012) 100%);
    border:1px solid var(--hair);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 40px 80px -40px rgba(0,0,0,0.9);
    padding:48px 56px;
    display:flex;flex-direction:column;gap:26px;
    opacity:0;transform:translateY(14px);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }
  @keyframes rise{to{opacity:1;transform:none;}}

  /* header */
  .head{display:flex;align-items:flex-start;justify-content:space-between;}
  .logo{display:flex;align-items:center;}
  .logo img{height:58px;width:auto;display:block;}
  .meta{text-align:right;}
  .live{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--hair);
    border-radius:999px;padding:7px 16px;font-family:var(--label);font-weight:500;
    font-size:18px;letter-spacing:.22em;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--live);
    box-shadow:0 0 0 0 rgba(51,209,122,.55);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(51,209,122,.5);}70%{box-shadow:0 0 0 12px rgba(51,209,122,0);}100%{box-shadow:0 0 0 0 rgba(51,209,122,0);}}
  .clock{font-family:var(--serif);font-weight:500;font-size:46px;margin-top:8px;letter-spacing:.01em;}
  .source{font-family:var(--note);font-style:italic;font-size:24px;color:var(--ink-soft);margin-top:2px;}

  /* main grid: 22K hero + right column */
  .main{display:grid;grid-template-columns:1.74fr 1fr;grid-template-rows:430px;gap:24px;}
  .panel{background:var(--panel);border:1px solid var(--hair);border-radius:18px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);min-height:0;}

  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:0;}
  .hero .k-label{font-family:var(--label);font-weight:400;font-size:40px;letter-spacing:.42em;}
  .hero .k-sub{font-family:var(--note);font-style:italic;font-size:26px;color:var(--ink-soft);margin-top:10px;letter-spacing:.04em;}
  .hero .price{font-family:var(--serif);font-weight:700;font-size:132px;line-height:1;margin:16px 0 12px;letter-spacing:-.01em;}
  .hero .unit{font-family:var(--note);font-style:italic;font-size:25px;color:var(--ink-faint);}

  .col{display:grid;grid-template-rows:1fr 1px 1fr;height:100%;min-height:0;}
  .col .row{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;}
  .col .divider{height:1px;background:var(--hair);margin:0 36px;}
  .col .k-label{font-family:var(--label);font-weight:400;font-size:27px;letter-spacing:.34em;}
  .col .k-sub{font-family:var(--note);font-style:italic;font-size:19px;color:var(--ink-soft);margin-top:6px;}
  .col .price{font-family:var(--serif);font-weight:700;font-size:66px;line-height:1;margin-top:10px;}
  .col .unit{font-family:var(--note);font-style:italic;font-size:18px;color:var(--ink-faint);margin-top:4px;}

  /* bottom row */
  .bottom{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:128px;gap:24px;}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:0 40px;}
  .bar .left .b-label{font-family:var(--label);font-weight:400;font-size:29px;letter-spacing:.3em;}
  .bar .left .b-sub{font-family:var(--note);font-style:italic;font-size:19px;color:var(--ink-soft);margin-top:4px;}
  .bar .right{display:flex;align-items:baseline;gap:12px;}
  .bar .right .price{font-family:var(--serif);font-weight:700;font-size:56px;line-height:1;}
  .bar .right .unit{font-family:var(--note);font-style:italic;font-size:19px;color:var(--ink-faint);}

  /* footer */
  .foot{text-align:center;font-family:var(--note);font-style:italic;font-size:22px;color:var(--ink-soft);letter-spacing:.03em;}
</style>
</head>

<script>
  /* ---------- CONFIG ----------
     To go live, paste your Google Sheet gviz endpoint below
     (Sheet must contain the rows the AKGSMA scraper writes).
     Format: https://docs.google.com/spreadsheets/d/SHEET_ID/gviz/tq?sheet=Rates
     Leave blank to display the static values below.                      */
  const CONFIG = { FEED_URL: "https://docs.google.com/spreadsheets/d/1k9SR-mcY5R2B9MgKkNoAbKajYGrL3kcuZvsly-TSI2M/gviz/tq?sheet=Rates&headers=0", REFRESH_MS: 60000 };

  /* Fallback / current values (AKGSMA, 04/06/2026).
     14K and Platinum are not on AKGSMA — keep them manual here.          */
  let rates = {
    gold22k: 14310,
    gold18k: 11825,
    silver:  280,
    platinum: 7810,           // not on AKGSMA — manual
    updated: "04/06/2026, 05:11 pm"
  };

  const inr = n => "₹" + Number(n).toLocaleString("en-IN");

  // 14K is derived from the live 22K rate (14/22 karat ratio) — matches AKGSMA-based board.
  const gold14k = () => Math.round(rates.gold22k * 14 / 22);

  function render(){
    document.getElementById("p22").textContent = inr(rates.gold22k);
    document.getElementById("p18").textContent = inr(rates.gold18k);
    document.getElementById("p14").textContent = inr(gold14k());
    document.getElementById("pAg").textContent = inr(rates.silver);
    document.getElementById("pPt").textContent = inr(rates.platinum);
    document.getElementById("updated").textContent = "Last updated: " + rates.updated;
  }

  function tickClock(){
    const d = new Date();
    let h = d.getHours(); const ap = h >= 12 ? "pm" : "am";
    h = h % 12 || 12;
    const pad = x => String(x).padStart(2,"0");
    document.getElementById("clock").textContent =
      pad(h)+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())+" "+ap;
  }

  // Google returns dates as "Date(y,m,d,h,min,s)" (month 0-indexed). Format DD/MM/YYYY, h:mm am/pm.
  function fmtUpdated(cell){
    const f = cell && cell.f, v = cell && cell.v;
    const m = typeof v === "string" && /Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/.exec(v);
    if(m){
      const d = new Date(+m[1],+m[2],+m[3],+(m[4]||0),+(m[5]||0),+(m[6]||0));
      const pad = x => String(x).padStart(2,"0");
      let h = d.getHours(); const ap = h>=12?"pm":"am"; h = h%12||12;
      return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear()+", "+h+":"+pad(d.getMinutes())+" "+ap;
    }
    return f || (v!=null ? String(v) : rates.updated);
  }
  const toNum = cell => { const v = cell && cell.v; const n = parseFloat(String(v).replace(/[^0-9.]/g,"")); return isNaN(n)?null:n; };

  function applyFeed(json){
    const map = {};
    json.table.rows.forEach(r => { const k = r.c[0] && r.c[0].v; if(k!=null) map[k] = r.c[1] || {}; });
    const g22 = toNum(map.Gold22K), g18 = toNum(map.Gold18K), ag = toNum(map.Silver), pt = toNum(map.Platinum);
    if(g22!=null) rates.gold22k = g22;
    if(g18!=null) rates.gold18k = g18;
    if(ag!=null)  rates.silver  = ag;
    if(pt!=null)  rates.platinum = pt;            // optional Platinum row
    if(map.Updated) rates.updated = fmtUpdated(map.Updated);
    render();
  }

  // Load via JSONP (script tag). A plain fetch() to Google is blocked when the page
  // runs from a local file:// — a script tag is not, so this works everywhere.
  function loadFeed(){
    if(!CONFIG.FEED_URL) return;
    const cb = "__rates_cb_" + Date.now();
    const s = document.createElement("script");
    const cleanup = () => { try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); };
    window[cb] = json => { try{ applyFeed(json); }catch(e){ console.warn("parse failed", e); } cleanup(); };
    s.onerror = () => { console.warn("Feed unavailable, showing fallback values."); cleanup(); };
    s.src = CONFIG.FEED_URL + "&tqx=responseHandler:" + cb;
    document.head.appendChild(s);
  }

  /* scale the 1080p stage to fit the visible area (measure the fixed wrapper,
     which is always the true viewport size, so content can never push it taller) */
  function fit(){
    const w = document.getElementById("wrap");
    const s = Math.min(w.clientWidth/1920, w.clientHeight/1080);
    document.getElementById("stage").style.transform = "translate(-50%,-50%) scale("+s+")";
  }

  render();
  tickClock(); setInterval(tickClock, 1000);
  loadFeed(); setInterval(loadFeed, CONFIG.REFRESH_MS);
  fit();
  addEventListener("resize", fit);
  addEventListener("load", fit);
  requestAnimationFrame(fit);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fit); }
</script>
