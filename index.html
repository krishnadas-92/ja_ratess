<style>
  :root{
    --bg:#000000;
    --ink:#ffffff;
    --ink-soft:rgba(255,255,255,0.62);
    --ink-faint:rgba(255,255,255,0.40);
    --gold:#caa766;
    --gold-soft:rgba(202,167,102,0.45);
    --hair:rgba(255,255,255,0.10);
    --panel:rgba(255,255,255,0.035);
    --panel-2:rgba(255,255,255,0.05);
    --live:#33d17a;
    --serif:'Fraunces', 'Times New Roman', serif;
    --label:'Jost', sans-serif;
    --note:'Cormorant Garamond', serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;background:#000;overflow:hidden;}

  /* full-window, fluid: fills any window shape (tiles, splits, fullscreen) */
  #wrap{
    position:fixed;inset:0;overflow:hidden;color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, #161310 0%, #0a0908 38%, #000 100%);
  }
  #stage{position:absolute;inset:0;color:var(--ink);}

  /* decorative double frame + corner ornaments — scale with the window */
  .frame{position:absolute;inset:2.8vmin;border:0.16vmin solid var(--gold-soft);border-radius:2.2vmin;pointer-events:none;}
  .frame::before{content:"";position:absolute;inset:0.9vmin;border:0.09vmin solid rgba(202,167,102,0.22);border-radius:1.6vmin;}
  .corner{position:absolute;width:6.4vmin;height:6.4vmin;opacity:.5;}
  .corner svg{width:100%;height:100%;display:block;}
  .corner.tl{top:1.2vmin;left:1.2vmin;}
  .corner.tr{top:1.2vmin;right:1.2vmin;transform:scaleX(-1);}
  .corner.bl{bottom:1.2vmin;left:1.2vmin;transform:scaleY(-1);}
  .corner.br{bottom:1.2vmin;right:1.2vmin;transform:scale(-1);}

  /* card fills the window inside the frame */
  .card{
    position:absolute;inset:5vmin;border-radius:1.8vmin;
    background:linear-gradient(180deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.02) 30%, rgba(255,255,255,0.012) 100%);
    border:1px solid var(--hair);
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08), 0 4vmin 8vmin -4vmin rgba(0,0,0,0.9);
    padding:3.2vmin 4.2vmin;
    display:flex;flex-direction:column;gap:2.2vmin;
    opacity:0;transform:translateY(1.2vmin);
    animation:rise .9s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }
  @keyframes rise{to{opacity:1;transform:none;}}

  /* header */
  .head{display:flex;align-items:flex-start;justify-content:space-between;flex:0 0 auto;}
  .logo{display:flex;align-items:center;}
  .logo img{height:5.2vmin;width:auto;display:block;}
  .meta{text-align:right;}
  .live{display:inline-flex;align-items:center;gap:0.9vmin;border:1px solid var(--hair);
    border-radius:999px;padding:0.6vmin 1.4vmin;font-family:var(--label);font-weight:500;
    font-size:1.6vmin;letter-spacing:.22em;}
  .dot{width:0.9vmin;height:0.9vmin;border-radius:50%;background:var(--live);
    box-shadow:0 0 0 0 rgba(51,209,122,.55);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(51,209,122,.5);}70%{box-shadow:0 0 0 1.1vmin rgba(51,209,122,0);}100%{box-shadow:0 0 0 0 rgba(51,209,122,0);}}
  .clock{font-family:var(--serif);font-weight:500;font-size:4.2vmin;margin-top:0.7vmin;letter-spacing:.01em;}
  .source{font-family:var(--note);font-style:italic;font-size:2.2vmin;color:var(--ink-soft);margin-top:0.2vmin;}

  /* main: 22K hero + right column — flexes to fill height */
  .main{flex:1 1 0;min-height:0;display:grid;grid-template-columns:1.48fr 1fr;grid-template-rows:100%;gap:2.2vmin;}
  .panel{background:var(--panel);border:1px solid var(--hair);border-radius:1.5vmin;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);min-height:0;overflow:hidden;}

  .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:0;}
  .hero .k-label{font-family:var(--label);font-weight:400;font-size:3.6vmin;letter-spacing:.42em;}
  .hero .k-sub{font-family:var(--note);font-style:italic;font-size:2.4vmin;color:var(--ink-soft);margin-top:0.9vmin;letter-spacing:.04em;}
  .hero .price{font-family:var(--serif);font-weight:700;font-size:10.2vmin;line-height:1;margin:1.4vmin 0 1vmin;letter-spacing:-.01em;}
  .hero .unit{font-family:var(--note);font-style:italic;font-size:2.3vmin;color:var(--ink-faint);}

  .col{display:grid;grid-template-rows:1fr 1px 1fr 1px 1fr;height:100%;min-height:0;}
  .col .row{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2.4vmin 1.6vmin;min-height:0;}
  .col .divider{height:1px;background:var(--hair);margin:0 3.3vmin;}
  .col .k-label{font-family:var(--label);font-weight:400;font-size:2.75vmin;letter-spacing:.34em;}
  .col .k-sub{font-family:var(--note);font-style:italic;font-size:1.95vmin;color:var(--ink-soft);margin-top:0.5vmin;}
  .col .price{font-family:var(--serif);font-weight:700;font-size:6.9vmin;line-height:1;margin-top:0;}
  .col .unit{font-family:var(--note);font-style:italic;font-size:1.8vmin;color:var(--ink-faint);margin-top:0;}
  /* 24/18/14: rate and 'per gram' on one line, per gram to the right */
  .col .priceline{display:flex;align-items:baseline;justify-content:center;gap:1vmin;margin-top:1vmin;}

  /* bottom row */
  .bottom{flex:0 0 auto;display:grid;grid-template-columns:1fr 1fr;gap:2.2vmin;margin-top:1.6vmin;}
  .bar{display:flex;align-items:center;justify-content:space-between;padding:1.9vmin 3.6vmin;}
  .bar .left .b-label{font-family:var(--label);font-weight:400;font-size:2.7vmin;letter-spacing:.3em;}
  .bar .left .b-sub{font-family:var(--note);font-style:italic;font-size:1.75vmin;color:var(--ink-soft);margin-top:0.35vmin;}
  .bar .right{display:flex;align-items:baseline;gap:1.1vmin;}
  .bar .right .price{font-family:var(--serif);font-weight:700;font-size:5.2vmin;line-height:1;}
  .bar .right .unit{font-family:var(--note);font-style:italic;font-size:1.75vmin;color:var(--ink-faint);}

  /* footer */
  .foot{flex:0 0 auto;text-align:center;font-family:var(--note);font-style:italic;font-size:2vmin;color:var(--ink-soft);letter-spacing:.03em;}

  /* Fraunces display look for all numbers (optical size 144, tabular figures) */
  .clock, .hero .price, .col .price, .bar .right .price{
    font-variation-settings:'opsz' 144;
    font-variant-numeric:tabular-nums;
    letter-spacing:-.015em;
  }
  /* rupee sign: same family, a touch smaller & lighter, with a small gap before the number */
  .price .rs{
    font-size:0.85em;
    margin-right:0.1em;
    vertical-align:0.04em;
    font-variation-settings:'opsz' 36,'wght' 600;
    letter-spacing:0;
  }

  /* gold-coloured rate numbers with a slow shimmer that sweeps every 5s */
  .hero .price, .col .price{
    background-image:
      linear-gradient(115deg, transparent 40%, rgba(255,249,225,.6) 50%, transparent 60%),
      linear-gradient(180deg,#f4df97 0%,#dcb863 46%,#bd8d3f 100%);
    background-size:250% 100%, 100% 100%;
    background-position:160% 0, 0 0;
    background-repeat:no-repeat;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    animation:goldShimmer 5s ease-in-out infinite;
  }
  @keyframes goldShimmer{
    0%   { background-position:160% 0, 0 0; }
    45%  { background-position:-60% 0, 0 0; }
    100% { background-position:-60% 0, 0 0; }
  }
  @media (prefers-reduced-motion: reduce){
    .hero .price, .col .price{ animation:none; background-position:0 0, 0 0; }
  }

  /* distinct metallic tints: silver (neutral grey) vs platinum (cool blue-steel) */
  #pAg{
    background:linear-gradient(180deg,#f1f3f4 0%,#c4c9cc 48%,#969b9f 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
  #pPt{
    background:linear-gradient(180deg,#e7effc 0%,#b6c6e3 48%,#8492ae 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
</style>
</head>

  const inr = n => '<span class="rs">\u20B9</span>' + Number(n).toLocaleString("en-IN");

  // 14K is derived from the live 22K rate (14/22 karat ratio) — matches AKGSMA-based board.
  const gold14k = () => Math.round(rates.gold22k * 14 / 22);
  const gold24k = () => Math.round(rates.gold22k / 0.91634);   // matches josalukkas.com website 24K

  function render(){
    document.getElementById("p22").innerHTML = inr(rates.gold22k);
    document.getElementById("p18").innerHTML = inr(rates.gold18k);
    document.getElementById("p14").innerHTML = inr(gold14k());
    document.getElementById("p24").innerHTML = inr(gold24k());
    document.getElementById("pAg").innerHTML = inr(rates.silver);
    document.getElementById("pPt").innerHTML = inr(rates.platinum);
    document.getElementById("updated").textContent = "Last updated: " + rates.updated;
  }

  function tickClock(){
    const d = new Date();
    let h = d.getHours(); const ap = h >= 12 ? "pm" : "am";
    h = h % 12 || 12;
    const pad = x => String(x).padStart(2,"0");
    document.getElementById("clock").textContent =
      pad(h)+":"+pad(d.getMinutes())+":"+pad(d.getSeconds())+" "+ap;
  }

  // Google returns dates as "Date(y,m,d,h,min,s)" (month 0-indexed). Format DD/MM/YYYY, h:mm am/pm.
  function fmtUpdated(cell){
    const f = cell && cell.f, v = cell && cell.v;
    const m = typeof v === "string" && /Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/.exec(v);
    if(m){
      const d = new Date(+m[1],+m[2],+m[3],+(m[4]||0),+(m[5]||0),+(m[6]||0));
      const pad = x => String(x).padStart(2,"0");
      let h = d.getHours(); const ap = h>=12?"pm":"am"; h = h%12||12;
      return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear()+", "+h+":"+pad(d.getMinutes())+" "+ap;
    }
    return f || (v!=null ? String(v) : rates.updated);
  }
  const toNum = cell => { const v = cell && cell.v; const n = parseFloat(String(v).replace(/[^0-9.]/g,"")); return isNaN(n)?null:n; };

  function applyFeed(json){
    const map = {};
    json.table.rows.forEach(r => { const k = r.c[0] && r.c[0].v; if(k!=null) map[k] = r.c[1] || {}; });
    const g22 = toNum(map.Gold22K), g18 = toNum(map.Gold18K), ag = toNum(map.Silver), pt = toNum(map.Platinum);
    if(g22!=null) rates.gold22k = g22;
    if(g18!=null) rates.gold18k = g18;
    if(ag!=null)  rates.silver  = ag;
    if(pt!=null)  rates.platinum = pt;            // optional Platinum row
    if(map.Updated) rates.updated = fmtUpdated(map.Updated);
    render();
  }

  // Load via JSONP (script tag). A plain fetch() to Google is blocked when the page
  // runs from a local file:// — a script tag is not, so this works everywhere.
  function loadFeed(){
    if(!CONFIG.FEED_URL) return;
    const cb = "__rates_cb_" + Date.now();
    const s = document.createElement("script");
    const cleanup = () => { try{ delete window[cb]; }catch(e){} if(s.parentNode) s.parentNode.removeChild(s); };
    window[cb] = json => { try{ applyFeed(json); }catch(e){ console.warn("parse failed", e); } cleanup(); };
    s.onerror = () => { console.warn("Feed unavailable, showing fallback values."); cleanup(); };
    s.src = CONFIG.FEED_URL + "&tqx=responseHandler:" + cb;
    document.head.appendChild(s);
  }

  /* scale the 1080p stage to fit the visible area (measure the fixed wrapper,
     which is always the true viewport size, so content can never push it taller) */
  function fit(){
    const w = document.getElementById("wrap");
    // Fill the viewport width (like a full-bleed board); the second term keeps the
    // actual content (~920px tall, centred) from ever being clipped — only the empty
    // top/bottom margin may crop. On a true 16:9 screen this is a perfect edge-to-edge fill.
    const s = Math.min(w.clientWidth/1920, w.clientHeight/920);
    /* fluid layout — no transform scaling needed */
  }

  render();
  tickClock(); setInterval(tickClock, 1000);
  loadFeed(); setInterval(loadFeed, CONFIG.REFRESH_MS);
  fit();
  addEventListener("resize", fit);
  addEventListener("load", fit);
  requestAnimationFrame(fit);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(fit); }
</script>
</body>
</html>
